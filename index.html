<!DOCTYPE html>
<html>
<head>
  <title>Karmona AI</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .hero {
      padding: 60px;
      background: linear-gradient(135deg,#1e3a8a,#9333ea);
    }

    .btn {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .agents {
      padding: 40px;
    }

    .card {
      background: #1e293b;
      margin: 15px;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      width: 250px;
    }

    iframe {
      border-radius: 10px;
      border: none;
    }

    footer {
      margin-top: 30px;
      padding: 20px;
      background: #020617;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Karmona AI</h1>
  <p>Hire Smart AI Agents for Your Business 🚀</p>
</div>

<!-- AGENTS -->
<div class="agents">
  <h2>Our AI Agents</h2>

  <div class="card">
    <h3>Support Agent</h3>
    <p>Handles customer queries 24/7</p>
    <a href="support.html"><button class="btn">Use</button></a>
  </div>

  <div class="card">
    <h3>Content Agent</h3>
    <p>Creates social media content</p>
    <a href="content.html"><button class="btn">Use</button></a>
  </div>

</div>

<footer>
  <p>Contact: yournumber | your@email.com</p>
</footer>

</body>
</html>
